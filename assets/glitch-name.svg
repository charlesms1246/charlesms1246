<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 110" width="800" height="110">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');

      text {
        font-family: 'Press Start 2P', 'Courier New', monospace;
        font-size: 48px;
        dominant-baseline: middle;
      }

      .main {
        fill: #A8FF3E;
        animation: mainShake 2s infinite steps(1);
      }

      .g1 {
        fill: #FF6EE7;
        animation: glitch1 2s infinite steps(1);
      }

      .g2 {
        fill: #378ADD;
        animation: glitch2 2s infinite steps(1);
      }

      @keyframes mainShake {
        0%,  76%, 100% { transform: translate(0, 0); }
        77%            { transform: translate(-2px, 0); }
        79%            { transform: translate( 2px, 0); }
        81%            { transform: translate(-1px, 0); }
        83%            { transform: translate( 0,   0); }
        88%            { transform: translate(-2px, 0); }
        90%            { transform: translate( 1px, 0); }
        92%            { transform: translate( 0,   0); }
      }

      @keyframes glitch1 {
        0%,  75%, 100% {
          opacity: 0;
          clip-path: none;
          transform: translate(0, 0);
        }
        76% {
          opacity: 1;
          clip-path: polygon(0 10%, 100% 10%, 100% 32%, 0 32%);
          transform: translate(-5px, 0);
        }
        78% {
          opacity: 1;
          clip-path: polygon(0 55%, 100% 55%, 100% 78%, 0 78%);
          transform: translate( 5px, 0);
        }
        80% {
          opacity: 1;
          clip-path: polygon(0 28%, 100% 28%, 100% 48%, 0 48%);
          transform: translate(-3px, 0);
        }
        82% {
          opacity: 0;
          clip-path: none;
          transform: translate(0, 0);
        }
        87% {
          opacity: 1;
          clip-path: polygon(0 62%, 100% 62%, 100% 80%, 0 80%);
          transform: translate( 4px, 0);
        }
        89% {
          opacity: 1;
          clip-path: polygon(0 18%, 100% 18%, 100% 38%, 0 38%);
          transform: translate(-4px, 0);
        }
        91% {
          opacity: 0;
          clip-path: none;
          transform: translate(0, 0);
        }
      }

      @keyframes glitch2 {
        0%,  77%, 100% {
          opacity: 0;
          clip-path: none;
          transform: translate(0, 0);
        }
        78% {
          opacity: 1;
          clip-path: polygon(0 42%, 100% 42%, 100% 65%, 0 65%);
          transform: translate( 4px, 0);
        }
        80% {
          opacity: 1;
          clip-path: polygon(0  5%, 100%  5%, 100% 22%, 0 22%);
          transform: translate(-4px, 0);
        }
        82% {
          opacity: 1;
          clip-path: polygon(0 70%, 100% 70%, 100% 90%, 0 90%);
          transform: translate( 3px, 0);
        }
        84% {
          opacity: 0;
          clip-path: none;
          transform: translate(0, 0);
        }
        88% {
          opacity: 1;
          clip-path: polygon(0 35%, 100% 35%, 100% 55%, 0 55%);
          transform: translate(-3px, 0);
        }
        90% {
          opacity: 1;
          clip-path: polygon(0 15%, 100% 15%, 100% 30%, 0 30%);
          transform: translate( 5px, 0);
        }
        92% {
          opacity: 0;
          clip-path: none;
          transform: translate(0, 0);
        }
      }
    </style>
  </defs>

  <text x="400" y="55" text-anchor="middle" class="g1">CHARLES M S</text>
  <text x="400" y="55" text-anchor="middle" class="g2">CHARLES M S</text>
  <text x="400" y="55" text-anchor="middle" class="main">CHARLES M S</text>
</svg>
